name: PROD_DEPLOY

on:
  push:
    branches: [ develop ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prod
      aws-assume-role-arn: "arn:aws:iam::801528680042:role/github-actions-fabiossena-pipeline"
      aws-region: "us-east-1"
      aws-s3-bucket-statefile-s3-bucket: "s3-bucket-fabiossena-us-east-1-terraform-statefile"
      aws-lock-dynamodb-table: "dynamodb-fabiossena-us-east-1-terraform-lock"